<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My App – Piscina</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --t: #B84A0A; --td: #7A2A00; --gold: #D4880A;
  --gl: #F2C040; --cream: #FDF6EC; --cm: #F0E2CC;
  --brown: #4A2810; --text: #1E0E04;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
header{position:relative;background:#FDFAF5;padding:36px 24px 52px;text-align:center;border-bottom:none;overflow:hidden;min-height:110px}
.wm{display:none}
.hc{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,5vw,2.8rem);font-weight:600;color:#5C2E0A;letter-spacing:3px;line-height:1}
.hdiv{width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(184,74,10,.35),transparent);margin:12px auto 10px}
.htag{font-size:.65rem;font-weight:400;color:rgba(92,46,10,.5);letter-spacing:3.5px;text-transform:uppercase}

/* ── FLOATING CARD (topbar + legenda) sovrapposta all'header ── */
.controls-card{
  position:relative;
  z-index:300;
  margin:-28px 14px 0;       /* sale sopra l'header */
  background:rgba(255,252,248,.97);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:18px;
  box-shadow:0 6px 28px rgba(80,30,0,.13), 0 1px 0 rgba(255,255,255,.9) inset;
  border:1px solid rgba(210,160,90,.18);
  overflow:hidden;
}
/* Topbar dentro la card */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:transparent;position:sticky;top:0;z-index:300}
.topbar-date{display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--brown);font-weight:500}
.topbar-input{border:1.5px solid var(--cm);border-radius:10px;padding:7px 12px;font-family:'DM Sans',sans-serif;font-size:.92rem;color:var(--text);background:white;outline:none;transition:border-color .2s;cursor:pointer}
.topbar-input:focus{border-color:var(--t)}
.topbar-admin{background:none;border:none;font-size:1.25rem;cursor:pointer;opacity:.35;padding:4px 6px;transition:opacity .2s;line-height:1}
.topbar-admin:hover{opacity:.75}
/* Divisore interno alla card */
.card-divider{height:1px;background:rgba(184,74,10,.08);margin:0 16px}
/* Legenda dentro la card */
.leg{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;padding:10px 18px 13px;background:transparent;font-size:.72rem;font-weight:500;color:var(--brown)}
.li{display:flex;align-items:center;gap:6px}
.ld{width:11px;height:11px;border-radius:50%;flex-shrink:0}

/* ── Contatore persone ── */
.pax-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.pax-row label{font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--t)}
.pax-ctrl{display:flex;align-items:center;gap:12px}
.pax-btn{width:34px;height:34px;border-radius:50%;border:2px solid var(--cm);background:white;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t);font-weight:700;transition:all .18s;line-height:1}
.pax-btn:hover{background:var(--t);color:white;border-color:var(--t)}
.pax-num{font-size:1.4rem;font-weight:700;color:var(--text);min-width:28px;text-align:center}


/* ── MAPPA ── */
.mw{padding:20px 16px 28px}
.mc{max-width:1000px;margin:0 auto;border-radius:20px;overflow:hidden;box-shadow:0 22px 64px rgba(60,20,0,.22),0 4px 12px rgba(0,0,0,.1);border:3px solid rgba(255,255,255,.28)}
#poolMap{width:100%;display:block}
@keyframes ws{0%,100%{opacity:.08;transform:translateX(-10px) skewX(-4deg)}50%{opacity:.18;transform:translateX(12px) skewX(4deg)}}
.ws1{animation:ws 4s ease-in-out infinite}
.ws2{animation:ws 6.5s ease-in-out 1.2s infinite}
.ug{transition:filter .18s ease;transform-box:fill-box;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.ug:hover{filter:brightness(1.12)}

/* ── TOOLTIP ── */
.tt{position:fixed;background:rgba(50,12,0,.92);color:#fff;padding:7px 13px;border-radius:10px;font-size:.76rem;font-family:'DM Sans',sans-serif;pointer-events:none;opacity:0;transition:opacity .16s;z-index:500;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.3)}
.tt.show{opacity:1}

/* ── ADMIN ── */
.as{display:none;max-width:900px;margin:0 auto;padding:0 16px 48px}
.as.open{display:block}
.at{display:flex;justify-content:space-between;align-items:center;padding:24px 0 16px;border-bottom:2px solid var(--cm);margin-bottom:20px}
.at h2{font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--td)}
.ast{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.sc{background:#fff;border-radius:14px;padding:14px 22px;border:1.5px solid var(--cm);box-shadow:0 2px 12px rgba(0,0,0,.06);transition:transform .2s}
.sc:hover{transform:translateY(-2px)}
.sc .v{font-family:'Cormorant Garamond',serif;font-size:1.8rem;color:var(--t);line-height:1}
.sc .l{font-size:.7rem;color:#aaa;margin-top:4px}
.dh{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--td);font-weight:600;padding:16px 0 6px;border-bottom:1px solid var(--cm);margin-bottom:8px}
.bc{background:#fff;border-radius:12px;padding:13px 16px;margin-bottom:7px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 10px rgba(0,0,0,.055);border-left:4px solid var(--t);transition:box-shadow .2s,transform .2s}
.bc:hover{box-shadow:0 4px 18px rgba(0,0,0,.1);transform:translateX(2px)}
.bc.mattina{border-left-color:var(--gold)}
.bc.pomeriggio{border-left-color:var(--t)}
.bc.giornata{border-left-color:var(--td)}
.bn{font-weight:600;font-size:.92rem}
.bd{font-size:.74rem;color:#aaa;margin-top:2px}
.bp{font-weight:700;color:var(--t);font-size:1.05rem;margin-left:auto}
.bdel{background:#FFF0F0;border:none;color:#C0392B;padding:6px 10px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:background .2s}
.bdel:hover{background:#FFD5D5}
.emp{text-align:center;padding:50px 20px;color:#ccc;font-size:.88rem}

/* ── MODALI ── */
.ov{position:fixed;inset:0;background:rgba(10,4,0,.6);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.open{opacity:1;pointer-events:all}
.mo{background:#fff;border-radius:28px 28px 0 0;padding:32px 28px 36px;width:100%;max-width:480px;box-shadow:0 -20px 60px rgba(0,0,0,.28);transform:translateY(100%);transition:transform .38s cubic-bezier(.2,.85,.3,1)}
.ov.open .mo{transform:translateY(0)}
.mo::before{content:'';display:block;width:42px;height:4px;background:#DDD;border-radius:4px;margin:0 auto 24px}
.mo h2{font-family:'Cormorant Garamond',serif;font-size:1.7rem;color:var(--td);margin-bottom:2px}
.ms{font-size:.73rem;color:#aaa;letter-spacing:1px;text-transform:uppercase;margin-bottom:22px}
.fr{margin-bottom:13px}
.fr label{display:block;font-size:.62rem;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:var(--t);margin-bottom:5px}
.fr input{width:100%;border:1.5px solid #EEE;border-radius:10px;padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:.9rem;color:var(--text);background:#FAFAFA;outline:none;transition:border-color .2s,background .2s}
.fr input:focus{border-color:var(--t);background:#fff}
.pb{background:linear-gradient(135deg,#FFF8EE,#FFF0D8);border:1.5px solid #E8C080;border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin:18px 0}
.pb .pl{font-size:.76rem;color:#999}
.pb .pn{font-size:.68rem;color:#bbb;margin-top:2px}
.pb .pa{font-size:1.7rem;font-weight:700;color:var(--td);font-family:'Cormorant Garamond',serif}
.bc2{width:100%;background:linear-gradient(135deg,var(--td),var(--t));color:#fff;border:none;padding:15px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:.3px;box-shadow:0 6px 20px rgba(184,74,10,.4);transition:all .2s}
.bc2:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(184,74,10,.5)}
.bc2:active{transform:translateY(0)}
.bcan{width:100%;background:none;border:1.5px solid #E0E0E0;color:#BBB;padding:12px;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:.88rem;cursor:pointer;margin-top:10px;transition:all .2s}
.bcan:hover{border-color:#AAA;color:#666}

/* ── TOAST ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--td);color:#fff;padding:13px 28px;border-radius:30px;font-size:.88rem;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.28);transition:transform .32s cubic-bezier(.2,.85,.3,1);z-index:3000;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── SUN SCENE ── */
.sun-scene{width:100%;background:#4AAAD8;line-height:0;overflow:hidden}
.sun-scene svg{width:100%;display:block;max-height:140px}

</style>
</head>
<body>

<!-- HEADER con sole animato nel background -->
<header>
  <svg id="sunSvg" viewBox="0 0 700 120" preserveAspectRatio="xMidYMid slice"
       style="position:absolute;inset:0;width:100%;height:100%;z-index:0">
    <defs>
      <!-- Cielo: gradiente orizzontale alba→mezzogiorno -->
      <linearGradient id="skyG" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%"   stop-color="#EDA050"/>
        <stop offset="40%"  stop-color="#A8CCDE"/>
        <stop offset="100%" stop-color="#5AAAD8"/>
      </linearGradient>
      <!-- Alone alba caldo -->
      <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
        <stop offset="0%"   stop-color="#FFD060" stop-opacity="0.9"/>
        <stop offset="45%"  stop-color="#F08020" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="#F08020" stop-opacity="0"/>
      </radialGradient>
      <filter id="sf">
        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Cielo -->
    <rect width="700" height="120" fill="url(#skyG)"/>

    <!-- Collina lontana -->
    <path d="M0,120 L0,82 C50,78,95,64,155,60 C215,56,260,72,330,68
             C400,64,445,50,510,48 C565,46,615,62,665,60 C685,59,700,62,700,64 L700,120 Z"
          fill="#4A7A32" opacity="0.65"/>
    <!-- Collina vicina -->
    <path d="M0,120 L0,100 C60,97,115,90,175,88 C245,85,300,96,370,94
             C440,92,500,100,570,98 C625,96,668,102,700,104 L700,120 Z"
          fill="#38621E" opacity="0.85"/>

    <!-- Bagliore orizzonte sx (alba) — svanisce con il sole -->
    <ellipse cx="18" cy="115" rx="90" ry="12" fill="#FFB030" opacity="0.55">
      <animate attributeName="opacity" values="0.55;0.55;0.1;0" dur="10s" fill="freeze"/>
      <animate attributeName="cx" values="18;80;180;18" dur="10s" fill="freeze"/>
    </ellipse>

    <!-- Linea myapp -->
    <line x1="350" y1="2" x2="350" y2="90"
          stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-dasharray="3,5"/>
    <text x="357" y="13" fill="rgba(255,255,255,0.32)"
          font-size="7" font-family="DM Sans,sans-serif" letter-spacing="1.5">12:00</text>

    <!-- ALONE del sole (segue il sole tramite animateMotion) -->
    <ellipse rx="52" ry="52" fill="url(#glowA)" opacity="0">
      <animate id="glowOpacity" attributeName="opacity" values="0;0.75;0.55;0.4" dur="10s" begin="indefinite" fill="freeze"/>
      <animateMotion id="glowMotion" dur="10s" begin="indefinite" fill="freeze"
        path="M 18,115 C 50,60 150,-10 350,18"/>
    </ellipse>

    <!-- SOLE — animateMotion lungo l'arco, fill=freeze si ferma -->
    <g filter="url(#sf)" transform="translate(18,115)">
      <!-- Disco -->
      <circle cx="0" cy="0" r="13" fill="#FF9020">
        <animate id="sunColor" attributeName="fill" values="#FF9020;#FFB830;#FFD040" dur="10s" begin="indefinite" fill="freeze"/>
      </circle>
      <circle cx="0" cy="0" r="9" fill="#FFF8A0" opacity="0.6"/>
      <!-- Raggi -->
      <g stroke="#FFD040" stroke-width="1.8" stroke-linecap="round" opacity="0.88">
        <line x1="0"   y1="-19" x2="0"   y2="-24"/>
        <line x1="0"   y1="19"  x2="0"   y2="24"/>
        <line x1="-19" y1="0"   x2="-24" y2="0"/>
        <line x1="19"  y1="0"   x2="24"  y2="0"/>
        <line x1="-13" y1="-13" x2="-17" y2="-17"/>
        <line x1="13"  y1="-13" x2="17"  y2="-17"/>
        <line x1="-13" y1="13"  x2="-17" y2="17"/>
        <line x1="13"  y1="13"  x2="17"  y2="17"/>
      </g>
      <!-- animateMotion: parte dopo 2s, arco quadratico alba→mezzogiorno -->
      <animateMotion id="sunMotion" dur="10s" begin="indefinite" fill="freeze" calcMode="spline"
        keyTimes="0;0.5;1"
        keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"
        path="M 0,0 C 62,-85 182,-123 332,-97"/>
    </g>
  </svg>

  <!-- Testo sopra il sole -->
  <div class="hc" style="position:relative;z-index:2">
    <h1>My App</h1>
    <div class="hdiv"></div>
    <div class="htag">Prenotazione Piscina · </div>
  </div>
</header>
<div class="controls-card">
  <div class="topbar">
    <div class="topbar-date">
      <span>📅</span>
      <input type="date" id="datePicker" class="topbar-input">
    </div>
    <button class="topbar-admin" onclick="openAdmin()">⚙</button>
  </div>
  <div class="card-divider"></div>
  <div class="leg">
    <div class="li"><div class="ld" style="background:#7B4A18"></div>Libero</div>
    <div class="li"><div class="ld" style="background:#B84A0A"></div>Occupato</div>
    <div class="li"><div class="ld" style="background:#3A3A3A"></div>Non disponibile</div>
  </div>
</div>


<!-- MAPPA -->
<div class="mw">
  <div class="mc">
    <svg id="poolMap" viewBox="0 0 700 1080">
      <defs>
        <linearGradient id="gG" x1="0" y1="0" x2=".2" y2="1">
          <stop offset="0%" stop-color="#6BAA52"/>
          <stop offset="100%" stop-color="#448030"/>
        </linearGradient>
        <linearGradient id="pG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#5DD8F0"/>
          <stop offset="45%" stop-color="#28B0D0"/>
          <stop offset="100%" stop-color="#1680A0"/>
        </linearGradient>
        <linearGradient id="dG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#DDD0B0"/>
          <stop offset="100%" stop-color="#C4B090"/>
        </linearGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <filter id="sh"><feDropShadow dx="2" dy="3" stdDeviation="5" flood-opacity=".18"/></filter>
        <filter id="bsh"><feDropShadow dx="3" dy="6" stdDeviation="10" flood-color="#000" flood-opacity=".28"/></filter>
        <!-- Acqua mossa verticale -->
        <filter id="waterWave" x="-10%" y="-5%" width="120%" height="110%" color-interpolation-filters="sRGB">
          <feTurbulence type="turbulence" baseFrequency="0.035 0.012" numOctaves="5" result="noise" seed="1">
            <animate attributeName="seed" values="1;3;7;12;18;12;7;3;1" dur="6s" repeatCount="indefinite"/>
            <animate attributeName="baseFrequency"
              values="0.035 0.012;0.045 0.018;0.038 0.012;0.028 0.008;0.035 0.012"
              dur="5s" repeatCount="indefinite"/>
          </feTurbulence>
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="16" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="caustics" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
          <feTurbulence type="fractalNoise" baseFrequency="0.09 0.028" numOctaves="5" seed="3" result="noise">
            <animate attributeName="baseFrequency"
              values="0.09 0.028;0.10 0.036;0.095 0.028;0.082 0.022;0.09 0.028"
              dur="4s" repeatCount="indefinite"/>
            <animate attributeName="seed" values="3;8;14;20;3" dur="8s" repeatCount="indefinite"/>
          </feTurbulence>
          <feColorMatrix type="matrix"
            values="0 0 0 0 0.10  0 0 0 0 0.55  0 0 0 0 0.80  0 0 0 0.45 0"/>
        </filter>
        <!-- ClipPath piscina VERTICALE -->
        <clipPath id="poolClip">
          <rect x="235" y="310" width="230" height="490" rx="12"/>
        </clipPath>
      </defs>

      <!-- SFONDO PRATO -->
      <rect width="700" height="1080" fill="url(#gG)"/>
      <g opacity=".09" fill="#1A4A10">
        <circle cx="30" cy="30" r="4"/><circle cx="90" cy="15" r="3"/>
        <circle cx="620" cy="25" r="4"/><circle cx="670" cy="55" r="3"/>
        <circle cx="20" cy="700" r="4"/><circle cx="80" cy="750" r="3"/>
        <circle cx="600" cy="900" r="4"/><circle cx="660" cy="950" r="3"/>
        <circle cx="650" cy="700" r="4"/><circle cx="680" cy="800" r="3"/>
        <circle cx="30" cy="850" r="4"/><circle cx="60" cy="980" r="3"/>
      </g>

      <!-- DECK SUPERIORE (zona ombrelloni sopra) -->
      <rect x="30" y="25" width="640" height="278" rx="12" fill="url(#dG)" opacity=".3"/>

      <!-- DECK intorno piscina verticale -->
      <rect x="222" y="298" width="256" height="516" rx="14" fill="url(#dG)" opacity=".6"/>

      <!-- OMBRA piscina -->
      <rect x="241" y="316" width="230" height="490" rx="12" fill="rgba(0,0,0,.22)"/>

      <!-- ════════════════════════
           PISCINA VERTICALE
      ════════════════════════ -->
      <!-- Base acqua -->
      <rect x="235" y="310" width="230" height="490" rx="12" fill="url(#pG)"/>

      <!-- Caustiche di luce -->
      <g clip-path="url(#poolClip)">
        <rect x="235" y="310" width="230" height="490" fill="rgba(80,200,240,.20)" filter="url(#caustics)"/>
      </g>

      <!-- Acqua distorta — 3 layer -->
      <g clip-path="url(#poolClip)">
        <rect x="220" y="295" width="260" height="520" fill="rgba(40,176,210,.38)" filter="url(#waterWave)"/>
        <rect x="220" y="295" width="260" height="520" fill="rgba(93,216,240,.24)" filter="url(#waterWave)"
              transform="scale(1,-1) translate(0,-1100)"/>
        <rect x="220" y="295" width="260" height="520" fill="rgba(20,150,200,.18)" filter="url(#waterWave)"
              transform="scale(-1,1) translate(-700,0)"/>
      </g>

      <!-- Riflessi superficiali animati -->
      <g clip-path="url(#poolClip)">
        <ellipse cx="350" cy="420" rx="85" ry="14" fill="rgba(255,255,255,.14)">
          <animate attributeName="ry" values="14;20;10;14" dur="3.5s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="420;410;430;420" dur="4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".14;.24;.08;.14" dur="4s" repeatCount="indefinite"/>
        </ellipse>
        <ellipse cx="350" cy="600" rx="80" ry="12" fill="rgba(255,255,255,.10)">
          <animate attributeName="ry" values="12;18;8;12" dur="5s" repeatCount="indefinite"/>
          <animate attributeName="cy" values="600;588;612;600" dur="5s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values=".10;.20;.05;.10" dur="5s" repeatCount="indefinite"/>
        </ellipse>
        <!-- Glitter -->
        <circle cx="280" cy="370" r="3.5" fill="rgba(255,255,255,.62)">
          <animate attributeName="opacity" values=".62;0;.4;0;.62" dur="2.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="420" cy="450" r="3" fill="rgba(255,255,255,.55)">
          <animate attributeName="opacity" values="0;.55;0;.4;0" dur="3.1s" repeatCount="indefinite"/>
        </circle>
        <circle cx="265" cy="550" r="3" fill="rgba(255,255,255,.5)">
          <animate attributeName="opacity" values=".5;0;.5;0;.5" dur="2.2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="435" cy="650" r="3" fill="rgba(255,255,255,.45)">
          <animate attributeName="opacity" values="0;.45;0;.4;0" dur="3.8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="310" cy="740" r="2.5" fill="rgba(255,255,255,.5)">
