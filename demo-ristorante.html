function sbDel(path){return fetch(SB_URL+path,{method:"DELETE",headers:{"apikey":SB_KEY,"Authorization":"Bearer "+SB_KEY}});}

function loadBks(){
  sbGet("/rest/v1/prenotazioni?select=*").then(function(data){
    if(!Array.isArray(data)){render();return;}
    bks={};
    for(var i=0;i<data.length;i++){var r=data[i],o=dateToOff(r.giorno);bks[bkey(r.sala,o,r.slot,r.tavolo)]={nome:r.nome,tel:r.tel,persone:r.persone,note:r.nota||""};}
    render();
  }).catch(function(){render();});
}
function saveBk(sid,o,sl,tv,e){
  _saving=true;
  var g=offToDate(o),id=sid+"|"+g+"|"+sl+"|"+tv;
  sbPost("/rest/v1/prenotazioni",{id:id,sala:sid,giorno:g,slot:sl,tavolo:tv,nome:e.nome,tel:e.tel,persone:e.persone,nota:e.note})
    .then(function(){_saving=false;}).catch(function(){_saving=false;});
}
function deleteBk(sid,o,sl,tv){
  var g=offToDate(o),id=sid+"|"+g+"|"+sl+"|"+tv;
  sbDel("/rest/v1/prenotazioni?id=eq."+encodeURIComponent(id)).catch(function(){});
}

function svgEl(tag,attrs){
  var el=document.createElementNS(SVG_NS,tag);
  for(var k in attrs)el.setAttribute(k,attrs[k]);
  return el;
}

function addChair(g,x,y,rot,stool,booked){
  var fill=booked?"rgba(80,0,0,.5)":"#1e0c04";
  var stroke=booked?"rgba(150,30,30,.4)":"rgba(255,255,255,.15)";
  var el;
  if(stool){
    el=svgEl("circle",{cx:Math.round(x),cy:Math.round(y),r:5,fill:fill,stroke:stroke,"stroke-width":"1.2"});
  } else {
    el=svgEl("rect",{x:Math.round(x-5),y:Math.round(y-5),width:10,height:10,rx:2,fill:fill,stroke:stroke,"stroke-width":"1.2",transform:"rotate("+rot+","+Math.round(x)+","+Math.round(y)+")"});
  }
  g.appendChild(el);
}

function addChairsAround(g,cx,cy,r,n,stool,booked){
  for(var i=0;i<n;i++){
    var a=i*2*Math.PI/n-Math.PI/2;
    var d=r+12;
    addChair(g,cx+d*Math.cos(a),cy+d*Math.sin(a),Math.round(a*180/Math.PI+90),stool,booked);
  }
}

function addChairsTB(g,cx,cy,w,h,tn,bn,stool,booked){
  var i,x,y;
  if(tn>0){var sp=w/(tn+1);for(i=0;i<tn;i++){x=cx-w/2+sp*(i+1);y=cy-h/2-11;addChair(g,x,y,0,stool,booked);}}
  if(bn>0){var sp=w/(bn+1);for(i=0;i<bn;i++){x=cx-w/2+sp*(i+1);y=cy+h/2+10;addChair(g,x,y,0,stool,booked);}}
}

function addChairsLR(g,cx,cy,h,n,booked){
  var sp=h/(n+1);
  for(var i=0;i<n;i++){
    var y=cy-h/2+sp*(i+1);
    addChair(g,cx-w/2-12,y,0,false,booked);
    addChair(g,cx+w/2+12,y,0,false,booked);
  }
}

function renderFloor(){
  var fp=document.getElementById("fp");
  fp.innerHTML="";
  var fd=FLOOR[sala];if(!fd)return;

  var svg=document.createElementNS(SVG_NS,"svg");
  svg.setAttribute("viewBox",fd.vb);
  svg.setAttribute("preserveAspectRatio","xMidYMid meet");
  svg.style.width="100%";svg.style.height="100%";svg.style.display="block";
  fp.appendChild(svg);

  // Background
  svg.appendChild(svgEl("rect",{width:"100%",height:"100%",fill:"#160C06",rx:12}));

  // Sala-specific decorations
  if(sala==="interna"){
    svg.appendChild(svgEl("rect",{x:10,y:8,width:360,height:5,rx:2,fill:"rgba(160,50,30,.22)"}));
    svg.appendChild(svgEl("rect",{x:10,y:415,width:360,height:5,rx:2,fill:"rgba(160,50,30,.22)"}));
  }
  if(sala==="plateatico"){
    var divano=svgEl("rect",{x:2,y:270,width:160,height:44,rx:9,fill:"rgba(100,30,15,.35)",stroke:"rgba(160,50,30,.4)","stroke-width":"1.5"});
    svg.appendChild(divano);
    var dtxt=svgEl("text",{x:82,y:294,"text-anchor":"middle","dominant-baseline":"middle","font-size":10,fill:"rgba(240,232,220,.35)","font-style":"italic","font-family":"Cormorant Garamond,serif","pointer-events":"none"});
    dtxt.textContent="Divano";svg.appendChild(dtxt);
  }
  if(sala==="cucina"){
    var ct=svgEl("text",{x:190,y:200,"text-anchor":"middle","font-size":11,fill:"rgba(160,50,30,.1)","font-style":"italic","font-family":"Cormorant Garamond,serif","pointer-events":"none"});
    ct.textContent="cucina a vista";svg.appendChild(ct);
  }

  fd.tables.forEach(function(t){
    var k=bkey(sala,off,slot,t.n);
    var booked=!!bks[k];var entry=bks[k];
    var cx=t.cx,cy=t.cy,r=t.r||0,w=t.w||0,h=t.h||0;
    var lbl=t.lbl||(LBL[t.n]||t.n);
    var isRound=!!r;
    var isSG=!!t.sg;

    var g=document.createElementNS(SVG_NS,"g");
    g.style.cursor="pointer";
    svg.appendChild(g);

    // Banquette
    if(t.bq){
      g.appendChild(svgEl("rect",{x:cx-w/2-2,y:cy-h/2-20,width:w+4,height:17,rx:6,fill:"rgba(100,30,15,.4)",stroke:"rgba(160,50,30,.55)","stroke-width":"1.5"}));
    }

    // Chairs
    if(isRound) addChairsAround(g,cx,cy,r,t.pax,false,booked);
    else if(t.n==="54"){
      addChairsTB(g,cx,cy,w,h,2,2,false,booked);
      var sp2=h/4;
      for(var ii=0;ii<3;ii++){
        var yy=cy-h/2+sp2*(ii+1);
        addChair(g,cx-w/2-12,yy,0,false,booked);
        addChair(g,cx+w/2+12,yy,0,false,booked);
      }
    }
    else addChairsTB(g,cx,cy,w,h,Math.floor(t.pax/2),t.pax-Math.floor(t.pax/2),isSG,booked);

    // Table shape
    var tFill=booked?"rgba(100,0,0,.9)":"#261208";
    var tStroke=booked?"rgba(200,40,40,.85)":"rgba(139,26,26,.5)";
    var tSW=booked?"2":"1.5";
    var shape;
    if(isRound) shape=svgEl("circle",{cx:cx,cy:cy,r:r,fill:tFill,stroke:tStroke,"stroke-width":tSW});
    else shape=svgEl("rect",{x:cx-w/2,y:cy-h/2,width:w,height:h,rx:5,fill:tFill,stroke:tStroke,"stroke-width":tSW});
    g.appendChild(shape);

    // Table number
    var txt=svgEl("text",{x:cx,y:cy+1,"text-anchor":"middle","dominant-baseline":"middle","font-size":15,"font-weight":700,fill:"rgba(255,255,255,.92)","font-family":"Cormorant Garamond,serif","pointer-events":"none"});
    txt.textContent=lbl;g.appendChild(txt);

    // Booked label
    if(booked){
      var label=isAdmin&&entry?entry.nome.split(" ")[0]:"RISERVATO";
      var labelY=isRound?cy+r*0.45:cy+h/2*0.45;
      var btxt=svgEl("text",{x:cx,y:labelY,"text-anchor":"middle","dominant-baseline":"middle","font-size":7,"font-weight":700,fill:"rgba(255,200,200,.9)","font-family":"DM Sans,sans-serif","pointer-events":"none"});
      btxt.textContent=label;g.appendChild(btxt);
      g.style.opacity="0.65";
    }

    // Click
    g.addEventListener("click",(function(n,b,e){return function(){openModal(n,b,e);};})(t.n,booked,entry));
  });
}

function doForce(){forceBook=true;renderModal();}
function doFree(){delete bks[bkey(modalSala,off,slot,modalNum)];deleteBk(modalSala,off,slot,modalNum);closeModal();render();}
function switchSlot(s){slot=s;modalBooked=false;forceBook=false;renderModal();render();document.getElementById("modal").style.display="flex";}
function switchTable(n){modalNum=n;var k=bkey(modalSala,off,slot,n);modalBooked=!!bks[k];modalEntry=bks[k];forceBook=false;renderModal();}

function onPers(v){
  var pv=+(v)||0,ppl=getPpl(off,slot),pax=PAX[modalNum],err="";
  if(pv>pax)err="Max "+pax+" persone per questo tavolo";
  else if(ppl+pv>MAXP)err="Slot al completo – scegli un orario diverso";
  var el=document.getElementById("ferr"),inp=document.getElementById("fpers");
  if(el){
    if(err&&err.indexOf("Slot")>=0){
      var altSlots=[],i;for(i=0;i<SLOTS.length;i++){var s=SLOTS[i];if(s===slot||getPpl(off,s)+pv>MAXP||isBlkHard(modalSala,off,s,modalNum))continue;altSlots.push(s);}
      var ah='<div class="errbox">'+err+'</div>';
      if(altSlots.length>0){ah+='<div style="margin-top:8px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;color:rgba(240,232,220,.3);margin-bottom:6px">Orari disponibili</div><div style="display:flex;flex-wrap:wrap;gap:6px">';for(i=0;i<altSlots.length;i++)ah+='<button onclick="switchSlot(\''+altSlots[i]+'\')" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(160,50,30,.35);background:rgba(160,50,30,.12);color:rgba(240,232,220,.8);font-size:13px;font-weight:600;cursor:pointer">'+altSlots[i]+'</button>';ah+='</div></div>';}
      el.innerHTML=ah;el.style.display="block";
    }else if(err){el.innerHTML='<div class="errbox">'+err+'</div>';el.style.display="block";}
    else{el.innerHTML="";el.style.display="none";}
  }
  if(inp)inp.className="fi"+(err?" er":"");
  chkBook();
}
function chkBook(){var n=document.getElementById("fnome"),t=document.getElementById("ftel"),p=document.getElementById("fpers"),b=document.getElementById("bbk"),er=document.getElementById("ferr");if(!b)return;b.disabled=!(n&&n.value.trim())||!(t&&t.value.trim())||!(p&&p.value)||(er&&er.style.display!=="none"&&er.innerHTML!=="");}
function doBook(){
  var n=document.getElementById("fnome"),t=document.getElementById("ftel"),p=document.getElementById("fpers"),nt=document.getElementById("fnote");
  if(!n||!n.value.trim()||!t||!t.value.trim()||!p||!p.value)return;
  var entry={nome:n.value,tel:t.value,persone:p.value,note:(nt?nt.value:"")};
  bks[bkey(modalSala,off,slot,modalNum)]=entry;
  closeModal();render();
  saveBk(modalSala,off,slot,modalNum,entry);
}
function togAdmin(){if(isAdmin){isAdmin=false;if(off<0)off=0;}else{document.getElementById("pinov").style.display="flex";setTimeout(function(){var x=document.getElementById("pinput");if(x)x.focus();},100);}render();}
function closePin(){document.getElementById("pinov").style.display="none";document.getElementById("pinput").value="";document.getElementById("pinerr").textContent="";}
function tryPin(){var v=document.getElementById("pinput").value;if(v===PIN){isAdmin=true;closePin();render();}else{document.getElementById("pinerr").textContent="PIN errato";document.getElementById("pinput").value="";}}
function showCal(){calY=(new Date()).getFullYear();calM=(new Date()).getMonth();renderCal();document.getElementById("calov").style.display="flex";}
function closeCal(){document.getElementById("calov").style.display="none";}
function calPrev(){if(calM===0){calM=11;calY--;}else calM--;renderCal();}
function calNext(){if(calM===11){calM=0;calY++;}else calM++;renderCal();}
function renderCal(){
  document.getElementById("calmon").textContent=(new Date(calY,calM,1)).toLocaleDateString("it-IT",{"month":"long","year":"numeric"});
  var td=new Date();td.setHours(0,0,0,0);var first=new Date(calY,calM,1),sd=(first.getDay()+6)%7,days=(new Date(calY,calM+1,0)).getDate();
  var h='<div class="cdn">Lun</div><div class="cdn">Mar</div><div class="cdn">Mer</div><div class="cdn">Gio</div><div class="cdn">Ven</div><div class="cdn">Sab</div><div class="cdn">Dom</div>';
  for(var i=0;i<sd;i++)h+='<div></div>';
  for(var d=1;d<=days;d++){var dt=new Date(calY,calM,d),diff=Math.round((dt-td)/864e5),isPast=(diff<0&&!isAdmin);var cls="cday"+(dt.getTime()===td.getTime()?" tod":"")+(diff===off?" sel":"")+(isPast?" pst":"");h+='<div class="'+cls+'" onclick="pickDay('+diff+','+isPast+')">'+d+'</div>';}
  document.getElementById("cdays").innerHTML=h;
}
function pickDay(d,p){if(p)return;off=d;closeCal();render();}
function showRep(){
  var td=new Date();td.setHours(0,0,0,0);var tgt=new Date(td.getTime());tgt.setDate(td.getDate()+off);
  document.getElementById("repdate").textContent=tgt.toLocaleDateString("it-IT",{"weekday":"long","day":"numeric","month":"long","year":"numeric"});
  var h="",sids=["plateatico","interna","cucina","prive"];
  for(var si=0;si<sids.length;si++){
    var sid=sids[si],fi=[],se=[],j,k;
    for(j=0;j<FIRST.length;j++){var tbls=STABLES[sid]||[];for(k=0;k<tbls.length;k++){var e=bks[bkey(sid,off,FIRST[j],tbls[k])];if(e)fi.push({nome:e.nome,tel:e.tel,persone:e.persone,note:e.note,lbl:LBL[tbls[k]]||tbls[k],slot:FIRST[j]});}}
    for(j=0;j<SECOND.length;j++){var tbls=STABLES[sid]||[];for(k=0;k<tbls.length;k++){var e=bks[bkey(sid,off,SECOND[j],tbls[k])];if(e)se.push({nome:e.nome,tel:e.tel,persone:e.persone,note:e.note,lbl:LBL[tbls[k]]||tbls[k],slot:SECOND[j]});}}
    if(!fi.length&&!se.length)continue;
    h+='<div class="rsl"><div class="rsn">'+NOMI[sid]+'</div>';
    if(fi.length){h+='<div class="rsit">Primo Sitting - 17:30 fino 19:00</div>';for(j=0;j<fi.length;j++){var e=fi[j];h+='<div class="rrw"><div class="rnu">'+e.lbl+'</div><div class="rin"><div class="rnm">'+e.nome+'</div><div class="rdt">'+e.slot+' - '+e.tel+(e.note?' - '+e.note:'')+'</div></div><div class="rpx">'+e.persone+'px</div></div>';}}
    if(se.length){h+='<div class="rsit">Secondo Sitting - 19:30 fino 22:00</div>';for(j=0;j<se.length;j++){var e=se[j];h+='<div class="rrw"><div class="rnu">'+e.lbl+'</div><div class="rin"><div class="rnm">'+e.nome+'</div><div class="rdt">'+e.slot+' - '+e.tel+(e.note?' - '+e.note:'')+'</div></div><div class="rpx">'+e.persone+'px</div></div>';}}
    h+='</div>';
  }
  if(!h)h='<p style="text-align:center;color:rgba(240,232,220,.25);font-style:italic;padding:40px">Nessuna prenotazione</p>';
  document.getElementById("repbody").innerHTML=h;document.getElementById("repov").style.display="flex";
}
function hideRep(){document.getElementById("repov").style.display="none";}
